# yazi 调优 — Miller Columns 视觉 + Openers + zoxide 集成

[manager]
# 三列比例: 1:4:3 — 当前操作目录绝对主导，左右跳跃不再眩晕
ratio          = [ 1, 4, 3 ]
sort_by        = "natural"
sort_dir_first = true
show_hidden    = true
# 极客最爱: 看文件大小（单文件大小，多文件选中数量）
linemode       = "size"

[opener]
# block=true → nvim 退出后切回 yazi; orphan=true → 视频后台播放不阻塞 yazi
edit = [
    { run = 'nvim "$@"', block = true, for = "unix", desc = "Neovim" },
]
play = [
    { run = 'mpv "$@"', orphan = true, for = "unix", desc = "MPV" },
]

[open]
rules = [
    # 文本/代码默认 nvim
    { name = "*.{txt,md,markdown,json,yaml,yml,toml,ini,conf,py,rs,cpp,c,h,hpp,go,js,ts,jsx,tsx,html,css,scss,vim,lua,sh,zsh,bash,fish,xml,sql}", use = "edit" },
    # 视频丢给后台 mpv
    { mime = "video/*", use = "play" },
    # 音频
    { mime = "audio/*", use = "play" },
    # 图片在 yazi 内预览（不开外部）
    # 其他兜底 → 系统默认应用
    { name = "*", use = "default" },
]

[preview]
# 代码预览 tab 宽度
tab_size       = 4
# 图片预览最大尺寸（kitty 协议下）
max_width      = 1920
max_height     = 1080
image_filter   = "kitty"
image_quality  = 75

# zoxide 集成 — yazi 里按 z 即可瞬移到常去目录
# 不需要额外配置，yazi 检测到 zoxide 二进制即可
