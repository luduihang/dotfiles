# yazi 极简配置 — 只覆盖与默认值不同的部分
# yazi 内置默认值会自动填充未定义项，不需要放全量配置

[manager]
# 用 nvim 作为编辑器（先找 nvim，回退到 vim/vi）
editor = "nvim"

# 排序: 先目录后文件、按名字
sort_by     = "alphabetical"
sort_dir_first = true

# 显示隐藏文件
show_hidden = true

[opener]
# 编辑文本 ⇒ nvim
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]

[preview]
# 预览区最大尺寸
max_width  = 800
max_height = 600

# 图片预览 (kitty/ueberzug 协议，终端支持就生效)
image_filter  = "kitty"
image_quality = 75
