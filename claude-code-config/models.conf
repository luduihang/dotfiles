# ============================================================
# Claude Code 供应商配置文件
# 格式: INI-like sections
# 新增供应商: 添加一个 [section] + 在 ~/.claude/secrets/ 创建对应 .env
# ============================================================

[ds-pro]
name=DeepSeek-V4-Pro
base_url=https://api.deepseek.com/anthropic
auth_type=api_key
secret_file=deepseek.env
model=deepseek-v4-pro
sonnet_model=deepseek-v4-pro
opus_model=deepseek-v4-pro
haiku_model=deepseek-v4-flash
subagent_model=deepseek-v4-flash

[ds-flash]
name=DeepSeek-V4-Flash
base_url=https://api.deepseek.com/anthropic
auth_type=api_key
secret_file=deepseek.env
model=deepseek-v4-flash
sonnet_model=deepseek-v4-flash
opus_model=deepseek-v4-flash
haiku_model=deepseek-v4-flash
subagent_model=deepseek-v4-flash

[mm-m3]
name=MiniMax-M3
base_url=https://api.minimaxi.com/anthropic
auth_type=auth_token
secret_file=minimax.env
model=MiniMax-M3
sonnet_model=MiniMax-M3
opus_model=MiniMax-M3
haiku_model=MiniMax-M3
subagent_model=MiniMax-M3
extra_env=API_TIMEOUT_MS=3000000,CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1

[mm-m2.7]
name=MiniMax-M2.7
base_url=https://api.minimaxi.com/anthropic
auth_type=auth_token
secret_file=minimax.env
model=MiniMax-M2.7
sonnet_model=MiniMax-M2.7
opus_model=MiniMax-M2.7
haiku_model=MiniMax-M2.7
subagent_model=MiniMax-M2.7
extra_env=API_TIMEOUT_MS=3000000,CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
